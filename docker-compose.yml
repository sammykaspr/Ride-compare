services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ridecompare
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ridecompare
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      USE_MOCK_DISTANCE: ${USE_MOCK_DISTANCE:-false}
    ports: ["8000:8000"]
    depends_on: [db]
    volumes:
      - ./backend:/app

volumes:
  pgdata:
